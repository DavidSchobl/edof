name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      # Publishes the built site to the gh-pages branch. Enable GitHub Pages
      # for this repo with "Deploy from a branch: gh-pages" so it is served at
      # https://davidschobl.github.io/edof/
      - run: mkdocs gh-deploy --force
